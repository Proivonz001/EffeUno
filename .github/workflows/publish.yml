# Auto-publisher: nei weekend controlla se una sessione e' appena finita
# e la pubblica su R2 (i file statici livetiming si sbloccano a fine
# sessione, senza autenticazione). Lanciabile anche a mano.
name: publish-sessions

on:
  schedule:
    - cron: "*/30 9-23 * * 5,6"   # venerdi' e sabato
    - cron: "*/30 11-22 * * 0"    # domenica
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -q -r backend/requirements.txt boto3
      - uses: actions/cache@v4
        with:
          path: fastf1_cache
          key: fastf1-cache-${{ github.run_id }}
          restore-keys: fastf1-cache-
      - run: python scripts/auto_publish.py
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
